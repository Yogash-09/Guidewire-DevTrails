<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Login — GigShield AI</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans&display=swap" rel="stylesheet"/>
<style>
  :root{--teal:#00c9a7;--ink:#0a0e1a;}
  body{background:#f7f5f0;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
  .card{background:#fff;border-radius:20px;box-shadow:0 8px 40px rgba(0,0,0,.08);padding:2.5rem 2rem;max-width:400px;width:100%}
  .form-control{border-radius:10px;border:1.5px solid #e5e7eb;padding:.6rem .9rem;font-size:.9rem}
  .form-control:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(0,201,167,.12);outline:none}
  .btn-l{background:var(--ink);color:#fff;border:none;border-radius:999px;padding:.7rem;font-weight:700;width:100%;font-size:.95rem;transition:transform .2s}
  .btn-l:hover{transform:translateY(-2px)}
  .alert{border-radius:10px;font-size:.85rem}
</style>
</head>
<body>
<div class="card">
  <div class="text-center mb-4">
    <div style="font-size:2.2rem">🛵</div>
    <h2 style="font-family:'Syne',sans-serif;font-weight:800;color:var(--ink);font-size:1.45rem;margin:.3rem 0">Welcome Back</h2>
    <p style="font-size:.82rem;color:#6b7280">Enter your registered email to access your dashboard</p>
  </div>

  {% with msgs=get_flashed_messages(with_categories=true) %}
    {% for cat,msg in msgs %}
    <div class="alert alert-{{ 'success' if cat=='success' else ('info' if cat=='info' else 'danger') }} mb-3">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST">
    <div class="mb-4">
      <label style="font-size:.83rem;font-weight:500;color:var(--ink);display:block;margin-bottom:.3rem">Email Address</label>
      <input type="email" name="email" class="form-control"
             placeholder="you@gmail.com"
             autocomplete="email"
             required autofocus/>
    </div>
    <button type="submit" class="btn-l">Access Dashboard →</button>
  </form>

  <div class="text-center mt-3" style="font-size:.81rem;color:#6b7280">
    New worker? <a href="/register" style="color:var(--teal);font-weight:500">Register →</a>
  </div>
</div>
</body></html>
